app-id: page.codeberg.tpikonen.satellite
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: satellite
rename-desktop-file: satellite.desktop
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --talk-name=org.gtk.vfs.*
  - --system-talk-name=org.freedesktop.ModemManager1.*
  - --filesystem=xdg-documents/satellite-tracks:create
  - --filesystem=/run/gnss-share.sock:ro
  - --filesystem=/run/gps-share.sock:ro
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/gir-1.0
modules:
  - python3-requirements.json
  - name: ModemManager
    buildsystem: meson
    config-opts:
      - -Dudev=false
      - -Dmbim=false
      - -Dqmi=false
      - -Dqrtr=false
      - -Dexamples=false
      - -Dtests=false
      - -Dman=false
      - -Dbash_completion=false
      - -Dsystemdsystemunitdir=/app/lib/systemd/system
      - -Dudevdir=/app/lib/udev
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/mobile-broadband/ModemManager/-/archive/1.24.2/ModemManager-1.24.2.tar.gz
        sha256: fbc75adcc0d7b0565f256e7ff4e8872b0a37c4413ff576665f7470932d9c1b68
  - name: satellite
    sources:
      - type: archive
        url: https://codeberg.org/tpikonen/satellite/archive/0.9.2.tar.gz
        sha256: 833d8147eb1716232d75a32d5091e71f2af14d29c327714edac7f8cc320a00e4
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation --prefix=${FLATPAK_DEST} ./
